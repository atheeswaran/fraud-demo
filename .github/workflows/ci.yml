# .github/workflows/ci.yml

name: Fraud demo Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data from DVC cache
        run: |
          mkdir -p data
          MD5=$(python -c "import yaml; d=yaml.safe_load(open('data/fraud_data.csv.dvc')); print(d['outs'][0]['md5'])")
          cp dvc-storage/files/md5/${MD5:0:2}/${MD5:2} data/fraud_data.csv
      
      - name: Generate dataset
        run: python data/generate_data.py

      - name: Train model
        run: python training/step1_notebook.py

      - name: Run quality gate tests
        run: pytest tests/ -v --tb=short
